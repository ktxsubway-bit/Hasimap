<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HASI MAP - 가성비 식당 탐색기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 설정 (기존에 사용하시던 설정값 유지 확인 필수)
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyBS5WPpmyISgEa3EfLkCpKLkeTHkWs4Dgg",
            authDomain: "schooltime-9b21c.firebaseapp.com",
            projectId: "schooltime-9b21c",
            storageBucket: "schooltime-9b21c.firebasestorage.app",
            messagingSenderId: "92438652180",
            appId: "1:92438652180:web:19c43fb34a0a9d2ca28e01"
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'schooltime-9b21c';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 전역 객체 등록
        window.fb = { db, auth, appId, methods: { collection, addDoc, onSnapshot, query, serverTimestamp, signInAnonymously, signInWithCustomToken } };

        const bootstrap = async () => {
            const statusEl = document.getElementById('auth-status');
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    statusEl.innerText = "온라인: " + user.uid.substring(0, 5);
                    statusEl.className = "text-[10px] font-bold text-green-600 uppercase";
                    // 인증 성공 후 즉시 데이터 수신 시작
                    window.startListening();
                } else {
                    statusEl.innerText = "연결 대기 중...";
                }
            });

            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (e) {
                console.error("Auth Error:", e);
                statusEl.innerText = "인증 오류 발생";
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            window.initMap();
            bootstrap();
        });
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; touch-action: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        #map { height: calc(100vh - 64px); width: 100%; z-index: 1; background: #f8f9fa; }
        .custom-controls { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 92%; max-width: 500px; pointer-events: none; }
        .custom-controls > * { pointer-events: auto; }
        
        /* 마커 컨테이너 */
        .hasi-marker-container { display: flex !important; align-items: center; justify-content: center; position: relative; }
        
        /* H 핀 스타일 */
        .hasi-pin { background: #2563eb; color: white; border: 2px solid white; border-radius: 50% 50% 50% 0; transform: rotate(-45deg); box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-weight: 900; font-size: 14px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .hasi-pin span { transform: rotate(45deg); display: block; }
        
        /* 가격 레이블 */
        .price-label { position: absolute; top: -38px; background: white; padding: 5px 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1.5px solid #2563eb; white-space: nowrap; font-size: 11px; font-weight: 900; color: #2563eb; opacity: 0; transform: scale(0.5) translateY(10px); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; }
        
        /* 줌 레벨 16 이상 스타일 활성화 */
        .zoom-high .price-label { opacity: 1; transform: scale(1) translateY(0); }
        .zoom-high .hasi-pin { transform: rotate(-45deg) scale(0.85); opacity: 0.8; }

        .panel-transition { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .panel-hidden { transform: translateY(100%); }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; }
        
        .user-location-dot { background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
    </style>
</head>
<body class="bg-white">

    <header class="bg-white h-16 flex items-center px-4 justify-between border-b sticky top-0 z-[2000]">
        <div class="flex items-center space-x-2">
            <div class="bg-blue-600 p-1.5 rounded-lg shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /></svg>
            </div>
            <h1 class="text-lg font-black tracking-tighter italic uppercase">HASI <span class="text-blue-600">MAP</span></h1>
        </div>
        <div id="auth-status" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest text-right">서버 연결 중...</div>
    </header>

    <main class="relative h-full">
        <div class="custom-controls space-y-3" id="main-controls">
            <div class="bg-white rounded-2xl shadow-xl border border-gray-100 overflow-hidden flex items-center pr-2">
                <input id="search-input" type="text" placeholder="맛집이나 지역 검색" class="flex-grow p-4 outline-none bg-transparent text-sm font-semibold" onkeypress="if(event.keyCode==13) searchLocation('main')">
                <button onclick="searchLocation('main')" class="p-2 text-blue-600 font-bold">검색</button>
            </div>
            <div class="flex justify-between items-center">
                <div id="location-info" class="bg-white/90 backdrop-blur px-4 py-2 rounded-full text-[10px] font-black text-gray-500 shadow-sm border border-gray-100 italic uppercase">식당 정보를 불러오는 중...</div>
                <button onclick="openRegModal()" class="bg-blue-600 text-white px-6 py-2.5 rounded-full shadow-lg font-black text-sm active:scale-95 transition-all tracking-tight">식당 추가</button>
            </div>
        </div>

        <div id="map"></div>
        
        <!-- 등록 모달 -->
        <div id="reg-modal" class="fixed inset-0 z-[4000] bg-white flex flex-col panel-transition panel-hidden">
            <div class="flex items-center justify-between px-4 py-4 border-b">
                <button onclick="closeRegModal()" class="px-4 py-2 text-gray-400 font-bold text-sm">취소</button>
                <h2 class="text-lg font-black italic uppercase tracking-tight text-center">식당 정보 등록</h2>
                <div class="w-[50px]"></div>
            </div>
            
            <div class="flex-grow overflow-y-auto px-6 py-4 space-y-6">
                <div id="step-1" class="space-y-4">
                    <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest block">STEP 1. 위치 검색</label>
                    <div class="relative">
                        <input id="reg-addr" type="text" placeholder="주소 또는 건물명" 
                               class="w-full bg-gray-50 p-5 rounded-2xl font-bold border-2 border-gray-100 outline-none focus:border-blue-500 focus:bg-white transition-all text-base"
                               oninput="handleRegAddrInput(this.value)">
                        <div id="search-loader" class="absolute right-4 top-1/2 -translate-y-1/2 hidden">
                            <svg class="spinner h-5 w-5 text-blue-600" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                        </div>
                    </div>
                    <div id="search-results-list" class="space-y-2 max-h-[200px] overflow-y-auto hidden"></div>
                    <div class="bg-gray-50 border border-gray-100 p-4 rounded-xl flex items-center justify-between">
                        <p class="text-[11px] text-gray-500 font-bold italic">직접 위치를 지정하시겠습니까?</p>
                        <button onclick="startPinSelection()" class="text-[11px] bg-white border border-blue-200 text-blue-600 px-3 py-1.5 rounded-lg font-black uppercase">지도에서 찍기</button>
                    </div>
                </div>

                <div id="step-2" class="space-y-6 opacity-30 pointer-events-none transition-opacity duration-500">
                    <div class="space-y-2 pt-4 border-t border-dashed">
                        <label class="text-[10px] font-black text-blue-600 uppercase tracking-widest">STEP 2. 상세 입력</label>
                        <div class="bg-blue-600 p-4 rounded-xl text-[12px] font-black text-white shadow-md" id="selected-addr-display">주소를 선택해 주세요</div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">식당 이름</label>
                        <input id="reg-name" type="text" placeholder="식당 이름" class="w-full bg-gray-50 p-4 rounded-2xl font-bold border border-gray-100 outline-none focus:border-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">메뉴</label>
                            <input id="reg-menu" type="text" placeholder="예: 김치찌개" class="w-full bg-gray-50 p-4 rounded-2xl font-bold border border-gray-100 outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest">가격(원)</label>
                            <input id="reg-price" type="number" placeholder="8000" class="w-full bg-gray-50 p-4 rounded-2xl font-bold border border-gray-100 outline-none">
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-white border-t">
                <button id="save-btn" onclick="saveShop()" class="w-full bg-gray-300 text-white py-5 rounded-3xl font-black text-lg shadow-lg cursor-not-allowed transition-all uppercase tracking-widest">정보 저장하기</button>
            </div>
        </div>

        <!-- 핀 지정 모드 바 -->
        <div id="pin-mode-bar" class="fixed top-20 left-1/2 -translate-x-1/2 z-[3000] bg-blue-600 text-white px-6 py-3 rounded-full shadow-2xl hidden flex items-center space-x-3">
            <span class="text-sm font-black italic">지도를 길게 터치하여 핀을 찍으세요</span>
            <button onclick="cancelPinSelection()" class="bg-white/20 p-1 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
        </div>

        <!-- 상세 정보 패널 -->
        <div id="info-panel" class="fixed bottom-0 left-0 right-0 z-[2000] bg-white rounded-t-[2.5rem] shadow-2xl panel-transition panel-hidden">
            <div class="p-8 pb-10">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
                <h3 id="info-name" class="text-2xl font-black text-gray-900 tracking-tight"></h3>
                <p id="info-meta" class="text-lg font-bold text-blue-600 mt-1 mb-6"></p>
                <div class="bg-gray-50 p-5 rounded-2xl mb-8">
                    <label class="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-2">상세 주소</label>
                    <p id="info-addr" class="text-sm text-gray-600 font-bold"></p>
                </div>
                <button onclick="closePanel()" class="w-full bg-gray-900 text-white py-5 rounded-2xl font-black uppercase text-sm tracking-widest">닫기</button>
            </div>
        </div>
    </main>

    <script>
        let map, shopLayer, tempSearchLayer;
        let markersMap = new Map();
        let currentRegCoords = null;
        let isListening = false;
        let isPinMode = false;
        let searchTimer = null;

        window.initMap = function() {
            if (map) map.remove();

            map = L.map('map', { zoomControl: false, tap: false }).setView([37.5665, 126.9780], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB'
            }).addTo(map);
            
            shopLayer = L.layerGroup().addTo(map);
            tempSearchLayer = L.layerGroup().addTo(map);
            
            map.on('zoomend', updateZoomClass);
            updateZoomClass();

            map.on('click', (e) => {
                if (isPinMode) {
                    reverseGeocode(e.latlng.lat, e.latlng.lng);
                    cancelPinSelection();
                }
            });

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition((p) => {
                    const pos = [p.coords.latitude, p.coords.longitude];
                    L.marker(pos, { icon: L.divIcon({ className: 'user-location-dot', iconSize: [18, 18] }) }).addTo(map);
                    map.setView(pos, 15);
                }, (err) => console.log("Geolocation error", err));
            }
        };

        function updateZoomClass() {
            const zoom = map.getZoom();
            const mapEl = document.getElementById('map');
            if (zoom >= 16) {
                mapEl.classList.add('zoom-high');
            } else {
                mapEl.classList.remove('zoom-high');
            }
        }

        // Firebase 실시간 리스너 (가장 중요한 부분)
        window.startListening = () => {
            if (isListening) return;
            const { db, auth, methods, appId } = window.fb;
            if (!auth.currentUser) return;

            isListening = true;
            // RULE 1 준수: 정확한 경로 지정
            const colPath = `artifacts/${appId}/public/data/shops`;
            const colRef = methods.collection(db, colPath);
            
            methods.onSnapshot(colRef, (snap) => {
                snap.docChanges().forEach((change) => {
                    const id = change.doc.id;
                    const data = change.doc.data();
                    
                    if (change.type === "added" || change.type === "modified") {
                        // 기존 마커가 있다면 제거 후 다시 생성
                        if (markersMap.has(id)) {
                            shopLayer.removeLayer(markersMap.get(id));
                        }
                        
                        const marker = L.marker([data.lat, data.lng], {
                            icon: L.divIcon({ 
                                html: `<div class="hasi-marker-container">
                                          <div class="hasi-pin"><span>H</span></div>
                                          <div class="price-label">${data.price}</div>
                                       </div>`,
                                className: '', iconSize: [30, 30], iconAnchor: [15, 30] 
                            })
                        }).on('click', () => showInfo(data));
                        
                        marker.addTo(shopLayer);
                        markersMap.set(id, marker);
                    } else if (change.type === "removed") {
                        if (markersMap.has(id)) {
                            shopLayer.removeLayer(markersMap.get(id));
                            markersMap.delete(id);
                        }
                    }
                });
                document.getElementById('location-info').innerText = `${markersMap.size}개의 식당 데이터 동기화됨`;
            }, (err) => {
                console.error("Firestore Listen Error:", err);
                isListening = false;
            });
        };

        async function saveShop() {
            const { db, auth, methods, appId } = window.fb;
            if (!auth.currentUser) {
                alert("인증 세션이 만료되었습니다. 페이지를 새로고침하세요.");
                return;
            }

            const name = document.getElementById('reg-name').value.trim();
            const priceVal = document.getElementById('reg-price').value;
            const menu = document.getElementById('reg-menu').value.trim();
            const addr = document.getElementById('selected-addr-display').innerText.replace('📍 ', '');
            
            if (!name || !priceVal || !currentRegCoords) {
                alert("모든 필수 정보를 입력해 주세요.");
                return;
            }
            
            const saveBtn = document.getElementById('save-btn');
            saveBtn.innerText = "저장 중...";
            saveBtn.disabled = true;

            try {
                // RULE 1 준수: artifacts/appId/public/data/...
                const colRef = methods.collection(db, 'artifacts', appId, 'public', 'data', 'shops');
                await methods.addDoc(colRef, {
                    name, 
                    menu: menu || "대표 메뉴", 
                    addr,
                    price: Number(priceVal).toLocaleString() + '원',
                    lat: currentRegCoords.lat, 
                    lng: currentRegCoords.lng,
                    uid: auth.currentUser.uid,
                    createdAt: methods.serverTimestamp()
                });
                closeRegModal();
            } catch (e) {
                console.error("Save error:", e);
                alert("저장 오류: " + e.message);
            } finally {
                saveBtn.innerText = "정보 저장하기";
                saveBtn.disabled = false;
            }
        }

        // --- UI & 유틸리티 함수들 ---

        function handleRegAddrInput(value) {
            clearTimeout(searchTimer);
            if (value.trim().length < 2) return;
            searchTimer = setTimeout(() => searchLocation('reg'), 600);
        }

        async function searchLocation(mode) {
            const input = document.getElementById(mode === 'main' ? 'search-input' : 'reg-addr');
            const query = input.value.trim();
            const loader = document.getElementById('search-loader');
            const listEl = document.getElementById('search-results-list');

            if (mode === 'reg') {
                loader?.classList.remove('hidden');
                listEl.innerHTML = '';
            }

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=6&addressdetails=1&countrycodes=kr`);
                const data = await res.json();
                
                if (mode === 'reg') {
                    listEl.classList.remove('hidden');
                    if (data.length > 0) {
                        data.forEach(item => {
                            const addrParts = item.display_name.split(',').map(p => p.trim()).reverse();
                            const cleanAddr = addrParts.slice(1, 5).join(' ');
                            const div = document.createElement('div');
                            div.className = "bg-white border border-gray-100 p-4 rounded-xl cursor-pointer active:bg-blue-50 transition-colors shadow-sm";
                            div.innerHTML = `<p class="text-sm font-black text-gray-800">${item.name || "장소"}</p><p class="text-[10px] text-gray-400 mt-1">${cleanAddr}</p>`;
                            div.onclick = () => selectLocation(parseFloat(item.lat), parseFloat(item.lon), cleanAddr);
                            listEl.appendChild(div);
                        });
                    } else {
                        listEl.innerHTML = '<p class="p-4 text-center text-xs text-gray-400 font-bold">검색 결과가 없습니다.</p>';
                    }
                } else if (mode === 'main' && data.length > 0) {
                    map.setView([data[0].lat, data[0].lon], 16);
                }
            } catch (e) {
                console.error(e);
            } finally {
                loader?.classList.add('hidden');
            }
        }

        async function reverseGeocode(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1`);
                const data = await res.json();
                const addrParts = data.display_name.split(',').map(p => p.trim()).reverse();
                const cleanAddr = addrParts.slice(1, 5).join(' ');
                selectLocation(lat, lng, cleanAddr || "지정된 위치");
            } catch (e) {
                selectLocation(lat, lng, "지정된 위치");
            }
        }

        function selectLocation(lat, lng, addr) {
            currentRegCoords = { lat, lng };
            document.getElementById('selected-addr-display').innerText = `📍 ${addr}`;
            document.getElementById('search-results-list').classList.add('hidden');
            
            const step2 = document.getElementById('step-2');
            step2.style.opacity = "1";
            step2.style.pointerEvents = "auto";
            
            const saveBtn = document.getElementById('save-btn');
            saveBtn.classList.remove('bg-gray-300', 'cursor-not-allowed');
            saveBtn.classList.add('bg-blue-600');
            
            tempSearchLayer.clearLayers();
            L.circleMarker([lat, lng], { radius: 10, color: '#2563eb', weight: 3, fillColor: 'white', fillOpacity: 1 }).addTo(tempSearchLayer);
            map.setView([lat, lng], 18);
        }

        function showInfo(data) {
            document.getElementById('info-name').innerText = data.name;
            document.getElementById('info-meta').innerText = `${data.menu} · ${data.price}`;
            document.getElementById('info-addr').innerText = data.addr;
            document.getElementById('info-panel').classList.remove('panel-hidden');
            map.setView([data.lat, data.lng], 17);
        }

        window.startPinSelection = () => {
            isPinMode = true;
            document.getElementById('reg-modal').classList.add('panel-hidden');
            document.getElementById('pin-mode-bar').classList.remove('hidden');
        };

        window.cancelPinSelection = () => {
            isPinMode = false;
            document.getElementById('pin-mode-bar').classList.add('hidden');
            document.getElementById('reg-modal').classList.remove('panel-hidden');
        };

        window.closePanel = () => document.getElementById('info-panel').classList.add('panel-hidden');
        window.openRegModal = () => document.getElementById('reg-modal').classList.remove('panel-hidden');
        window.closeRegModal = () => {
            document.getElementById('reg-modal').classList.add('panel-hidden');
            tempSearchLayer.clearLayers();
            resetForm();
        };
        
        function resetForm() { 
            ['reg-name', 'reg-menu', 'reg-price', 'reg-addr'].forEach(id => document.getElementById(id).value = '');
            document.getElementById('selected-addr-display').innerText = "주소를 선택해 주세요";
            document.getElementById('step-2').style.opacity = "0.3";
            document.getElementById('step-2').style.pointerEvents = "none";
            document.getElementById('search-results-list').classList.add('hidden');
            const saveBtn = document.getElementById('save-btn');
            saveBtn.classList.add('bg-gray-300', 'cursor-not-allowed');
            saveBtn.classList.remove('bg-blue-600');
            currentRegCoords = null; 
        }
    </script>
</body>
</html>
